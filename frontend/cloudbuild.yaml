# Cloud Build: procure-ai-frontend image.
#
# Run from repo root:
#   gcloud builds submit \
#     --config=frontend/cloudbuild.yaml \
#     --substitutions=_NEXT_PUBLIC_SUPABASE_URL=https://hjhxcmfuivpsbhlagunr.supabase.co,_NEXT_PUBLIC_SUPABASE_ANON_KEY=<anon-key>
#
# The two substitutions are passed inline so this YAML can be committed
# without leaking any secrets — the anon key is supplied at build time
# by the deployer.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/procureai-prod/procure-ai/procure-ai-frontend:latest
      - -f
      - frontend/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-south1-docker.pkg.dev/procureai-prod/procure-ai/procure-ai-frontend:latest

images:
  - asia-south1-docker.pkg.dev/procureai-prod/procure-ai/procure-ai-frontend:latest

# Substitutions caller must provide. Empty defaults so a forgotten
# arg fails the build noisily rather than silently producing a
# Supabase-less image.
substitutions:
  _NEXT_PUBLIC_SUPABASE_URL: ""
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ""

options:
  logging: CLOUD_LOGGING_ONLY
  # Standalone Next.js + npm ci needs more memory than the default e2.
  machineType: E2_HIGHCPU_8

timeout: 1200s
