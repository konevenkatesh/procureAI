# Cloud Build: m3-evaluator image
# Run from repo root:
#   gcloud builds submit --config=services/m3-evaluator/cloudbuild.yaml
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/procureai-prod/procure-ai/m3-evaluator:latest
      - -f
      - services/m3-evaluator/Dockerfile
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-south1-docker.pkg.dev/procureai-prod/procure-ai/m3-evaluator:latest
images:
  - asia-south1-docker.pkg.dev/procureai-prod/procure-ai/m3-evaluator:latest
options:
  logging: CLOUD_LOGGING_ONLY
timeout: 600s
